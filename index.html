<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="top-bar">
            <div id="news-ticker"></div>
        </div>
        <div class="main-content">
            <div class="left-section">
                <div class="score-container">
                    <p><span id="score">0</span> cookies</p>
                    <p id="cps">per second: 0</p>
                </div>
                <div class="cookie-container">
                    <button id="cookie-btn"><img src="https://felixonline.co.uk/content/images/file/felixonline/img/upload/201401151610-me1711-games_cookie.png" alt="Cookie"></button>
                </div>
            </div>
            <div class="right-section">
                <h2>Store</h2>
                <div class="upgrades-container">
                    <div class="upgrade" id="auto-clicker-upgrade">
                        <div class="upgrade-info">
                            <h3>Auto Clicker</h3>
                            <p>Cost: <span id="auto-clicker-cost">10</span></p>
                        </div>
                        <div class="upgrade-level">
                            <span id="auto-clicker-level">0</span>
                        </div>
                    </div>
                    <div class="upgrade" id="grandma-upgrade">
                        <div class="upgrade-info">
                            <h3>Grandma</h3>
                            <p>Cost: <span id="grandma-cost">100</span></p>
                        </div>
                        <div class="upgrade-level">
                            <span id="grandma-level">0</span>
                        </div>
                    </div>
                    <div class="upgrade" id="factory-upgrade">
                        <div class="upgrade-info">
                            <h3>Factory</h3>
                            <p>Cost: <span id="factory-cost">500</span></p>
                        </div>
                        <div class="upgrade-level">
                            <span id="factory-level">0</span>
                        </div>
                    </div>
                    <div class="upgrade" id="mine-upgrade">
                        <div class="upgrade-info">
                            <h3>Mine</h3>
                            <p>Cost: <span id="mine-cost">2000</span></p>
                        </div>
                        <div class="upgrade-level">
                            <span id="mine-level">0</span>
                        </div>
                    </div>
                    <div class="upgrade" id="shipment-upgrade">
                        <div class="upgrade-info">
                            <h3>Shipment</h3>
                            <p>Cost: <span id="shipment-cost">10000</span></p>
                        </div>
                        <div class="upgrade-level">
                            <span id="shipment-level">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
